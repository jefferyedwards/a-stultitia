# Application
spring.application.name=timeofday-producer

# Server — use 8081 so producer and consumer can run simultaneously
server.port=8081

# DDS Configuration
dds.domain-id=0
dds.topic-name=TimeOfDay

# Producer Configuration
producer.publish-interval-ms=2000
producer.quotes-file=classpath:quotes.txt

# Actuator — expose selected endpoints over HTTP
management.endpoints.web.exposure.include=health,info,loggers,metrics,env,beans,configprops
management.endpoint.health.show-details=always

# Info endpoint
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=DDS TimeOfDay message producer
info.app.step=3 - Spring Boot Actuators
