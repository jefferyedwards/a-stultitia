# Application
spring.application.name=timeofday-consumer

# Server — use 8082 (producer uses 8081)
server.port=8082

# DDS Configuration
dds.domain-id=0
dds.topic-name=TimeOfDay

# Actuator — expose selected endpoints over HTTP
management.endpoints.web.exposure.include=health,info,loggers,metrics,env,beans,configprops
management.endpoint.health.show-details=always

# Info endpoint
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=DDS TimeOfDay message consumer
info.app.step=3 - Spring Boot Actuators
